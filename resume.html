<!DOCTYPE html>
<html>
<head>
    <title>resume</title>
</head>
<body>

    <h2>Grade Calculator (HTML Only)</h2>

    <label>Select Your Marks Range:</label>

    <select onchange="document.getElementById('result').innerHTML = 'Your Grade: ' + this.value;">
        <option value="">--Select--</option>
        <option value="A+ (90-100)">90 - 100</option>
        <option value="A (80-89)">80 - 89</option>
        <option value="B (70-79)">70 - 79</option>
        <option value="C (60-69)">60 - 69</option>
        <option value="D (50-59)">50 - 59</option>
        <option value="Fail (<50)">Below 50</option>
    </select>

    <h3 id="result"></h3>

</body>
</html>
